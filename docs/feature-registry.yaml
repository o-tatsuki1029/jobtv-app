# =============================================================================
# JOBTV 機能台帳 (Feature Registry)
# =============================================================================
#
# 機能一覧の正本。Excel / PPTX はこのファイルから自動生成する。
#
# 書き方ルール:
#   - app: アプリ名（JOBTV / Event System / Agent Manager / 共通基盤）
#   - category: 大カテゴリ
#   - subcategory: 中カテゴリ
#   - name: 機能名（簡潔に）
#   - detail: 機能詳細（複数行可）
#   - role: 対象ロール（admin / recruiter / candidate / system / 全ユーザー）
#   - tables: 関連テーブル/API（なければ "—"）
#
# 機能を追加するときは、該当アプリ・カテゴリのブロック末尾にエントリを追加する。
# =============================================================================

features:

  # ===========================================================================
  # JOBTV - 公開ページ
  # ===========================================================================

  # --- トップページ ---
  - app: JOBTV
    category: 公開ページ
    subcategory: トップページ
    name: ヒーローセクション
    detail: 動画/画像ベースの動的スライドショー（top_page_hero_items）
    role: 全ユーザー
    tables: top_page_hero_items

  - app: JOBTV
    category: 公開ページ
    subcategory: トップページ
    name: 注目動画表示
    detail: 就活Shorts・就活ドキュメンタリーの動画カルーセル（top_page_featured_videos）
    role: 全ユーザー
    tables: top_page_featured_videos, videos

  - app: JOBTV
    category: 公開ページ
    subcategory: トップページ
    name: アンバサダーカルーセル
    detail: トップページアンバサダーの表示（top_page_ambassadors）
    role: 全ユーザー
    tables: top_page_ambassadors

  - app: JOBTV
    category: 公開ページ
    subcategory: トップページ
    name: バナー表示
    detail: スクロールバナー・告知バナー（top_page_banners）
    role: 全ユーザー
    tables: top_page_banners

  - app: JOBTV
    category: 公開ページ
    subcategory: トップページ
    name: Shun Diariesカルーセル
    detail: コンテンツカルーセル表示（top_page_shun_diaries）
    role: 全ユーザー
    tables: top_page_shun_diaries

  - app: JOBTV
    category: 公開ページ
    subcategory: トップページ
    name: 企業カード一覧
    detail: 企業ロゴ・サムネイル付きカードグリッド表示
    role: 全ユーザー
    tables: companies, company_pages

  - app: JOBTV
    category: 公開ページ
    subcategory: トップページ
    name: SEO構造化データ
    detail: JSON-LD（VideoObjectList, BreadcrumbList）の自動出力
    role: 全ユーザー
    tables: "—"

  # --- 企業詳細 ---

    category: 公開ページ
    subcategory: 企業詳細
    name: 企業プロフィール表示
    detail: 企業情報（ロゴ・タグライン・福利厚生・SNSリンク等）の表示
    role: 全ユーザー
    tables: companies, company_pages

  - app: JOBTV
    category: 公開ページ
    subcategory: 企業詳細
    name: 企業動画一覧
    detail: カテゴリ別（main/shorts/documentary）の動画表示
    role: 全ユーザー
    tables: videos

  - app: JOBTV
    category: 公開ページ
    subcategory: 企業詳細
    name: 関連求人一覧
    detail: 企業に紐づくアクティブ求人の表示
    role: 全ユーザー
    tables: job_postings

  - app: JOBTV
    category: 公開ページ
    subcategory: 企業詳細
    name: 関連説明会一覧
    detail: 企業に紐づくアクティブ説明会の表示
    role: 全ユーザー
    tables: sessions

  - app: JOBTV
    category: 公開ページ
    subcategory: 企業詳細
    name: エントリーモーダル
    detail: エントリーボタン → モーダルフォームで応募
    role: candidate
    tables: applications

  - app: JOBTV
    category: 公開ページ
    subcategory: 企業詳細
    name: SEO構造化データ
    detail: JSON-LD（Organization, JobPosting, BreadcrumbList）
    role: 全ユーザー
    tables: "—"

  # --- 求人詳細 ---
  - app: JOBTV
    category: 公開ページ
    subcategory: 求人詳細
    name: 求人情報表示
    detail: タイトル・詳細・応募要件・給与・勤務地の表示
    role: 全ユーザー
    tables: job_postings

  - app: JOBTV
    category: 公開ページ
    subcategory: 求人詳細
    name: エントリー機能
    detail: ログイン済み学生のエントリーボタン → エントリーモーダル
    role: candidate
    tables: applications

  - app: JOBTV
    category: 公開ページ
    subcategory: 求人詳細
    name: 応募状況表示
    detail: ログイン済み学生の応募ステータス表示
    role: candidate
    tables: applications

  - app: JOBTV
    category: 公開ページ
    subcategory: 求人詳細
    name: SEO構造化データ
    detail: JSON-LD（JobPosting）
    role: 全ユーザー
    tables: "—"

  # --- 説明会詳細 ---
  - app: JOBTV
    category: 公開ページ
    subcategory: 説明会詳細
    name: 説明会情報表示
    detail: タイトル・日時・会場（名前・住所・Google Maps）・集合時間
    role: 全ユーザー
    tables: sessions

  - app: JOBTV
    category: 公開ページ
    subcategory: 説明会詳細
    name: 予約モーダル
    detail: 予約フォーム → 予約確定（定員管理・満席バッジ表示）
    role: candidate
    tables: session_reservations

  - app: JOBTV
    category: 公開ページ
    subcategory: 説明会詳細
    name: SEO構造化データ
    detail: JSON-LD（Event）
    role: 全ユーザー
    tables: "—"

  # --- イベントエントリー ---
  - app: JOBTV
    category: 公開ページ
    subcategory: イベントエントリー
    name: イベント日程選択
    detail: event_type_ids / from_days / to_days パラメータによるフィルタリング
    role: 全ユーザー
    tables: events

  - app: JOBTV
    category: 公開ページ
    subcategory: イベントエントリー
    name: WEB相談チェック
    detail: WEB相談希望チェックボックス
    role: candidate
    tables: event_reservations

  - app: JOBTV
    category: 公開ページ
    subcategory: イベントエントリー
    name: ログイン/新規登録フロー
    detail: 既存候補者ログイン or 新規登録＋予約の統合フロー
    role: candidate
    tables: candidates, profiles

  - app: JOBTV
    category: 公開ページ
    subcategory: イベントエントリー
    name: CAPTCHA認証
    detail: Cloudflare Turnstile（Supabase native）によるボット対策
    role: 全ユーザー
    tables: "—"

  - app: JOBTV
    category: 公開ページ
    subcategory: イベントエントリー
    name: 予約確定通知
    detail: 確認メール（SendGrid）/ LINE Push / Slack通知 / Sheets追記
    role: candidate
    tables: event_reservations

  - app: JOBTV
    category: 公開ページ
    subcategory: イベントエントリー
    name: サンクスページ
    detail: Googleカレンダー追加ボタン + LINE CTA表示
    role: candidate
    tables: "—"

  - app: JOBTV
    category: 公開ページ
    subcategory: イベントエントリー
    name: UTMパラメータ追跡
    detail: utm_source/medium/campaign/content/term のキャプチャ・保存
    role: 全ユーザー
    tables: event_reservations

  # --- LPコンテンツ ---
  - app: JOBTV
    category: 公開ページ
    subcategory: LPコンテンツ
    name: サンプル動画
    detail: LP用サンプル動画一覧（タグ・再生時間付き）
    role: 全ユーザー
    tables: lp_sample_videos

  - app: JOBTV
    category: 公開ページ
    subcategory: LPコンテンツ
    name: FAQ
    detail: よくある質問（Q&Aペア、display_order順）
    role: 全ユーザー
    tables: lp_faq_items

  - app: JOBTV
    category: 公開ページ
    subcategory: LPコンテンツ
    name: 企業ロゴ帯
    detail: 導入企業ロゴ表示（top/bottomの行位置指定）
    role: 全ユーザー
    tables: lp_company_logos

  - app: JOBTV
    category: 公開ページ
    subcategory: LPコンテンツ
    name: スクロールバナー
    detail: LP用スクロールバナー（is_active管理）
    role: 全ユーザー
    tables: lp_scroll_banners

  # --- 利用規約 ---
  - app: JOBTV
    category: 公開ページ
    subcategory: 利用規約
    name: 利用規約ページ
    detail: 静的コンテンツ + SEO JSON-LD（WebPage）
    role: 全ユーザー
    tables: "—"

  # ===========================================================================
  # JOBTV - 認証
  # ===========================================================================

  # --- 学生認証 ---
  - app: JOBTV
    category: 認証
    subcategory: 学生認証
    name: 新規会員登録
    detail: |-
      メール+パスワード+詳細プロフィール（氏名・性別・卒年・学校・学部・学科・専攻・希望勤務地・業界・職種・電話番号）
      利用規約同意・Turnstile CAPTCHA
      RPC create_candidate_and_link_profile() で candidates + profiles 作成
    role: candidate
    tables: candidates, profiles

  - app: JOBTV
    category: 認証
    subcategory: 学生認証
    name: 登録後通知
    detail: ウェルカムメール（LINE CTA付き）/ Slack通知 / Google Sheets追記
    role: candidate
    tables: "—"

  - app: JOBTV
    category: 認証
    subcategory: 学生認証
    name: ログイン
    detail: メール+パスワード + Turnstile CAPTCHA
    role: candidate
    tables: "—"

  - app: JOBTV
    category: 認証
    subcategory: 学生認証
    name: パスワードリセット
    detail: メールアドレス入力 → リセットメール → 新パスワード設定（Turnstile付き）
    role: candidate
    tables: "—"

  # --- 企業認証 ---
  - app: JOBTV
    category: 認証
    subcategory: 企業認証
    name: Studioログイン
    detail: メール+パスワード + Turnstile CAPTCHA（MFAはrecruiterは任意）
    role: recruiter
    tables: "—"

  - app: JOBTV
    category: 認証
    subcategory: 企業認証
    name: チームメンバー招待
    detail: メールアドレスでの招待リンク生成・送信（invite_team_member テンプレート）
    role: recruiter
    tables: profiles

  # --- 管理者認証 ---
  - app: JOBTV
    category: 認証
    subcategory: 管理者認証
    name: 管理者ログイン
    detail: メール+パスワード + Turnstile CAPTCHA + MFA必須（TOTP）
    role: admin
    tables: "—"

  - app: JOBTV
    category: 認証
    subcategory: 管理者認証
    name: MFA設定
    detail: |-
      初回: QRコード生成・バックアップコード発行
      以降: 6桁コード検証（AAL2セッション）
    role: admin
    tables: "—"

  - app: JOBTV
    category: 認証
    subcategory: 管理者認証
    name: 代理ログイン
    detail: |-
      管理者がrecruiterアカウントにマジックリンクでログイン（120分タイムアウト）
      監査ログ記録・AAL2維持
    role: admin
    tables: "—"

  # ===========================================================================
  # JOBTV - マイページ
  # ===========================================================================
  - app: JOBTV
    category: マイページ
    subcategory: プロフィール
    name: プロフィール編集
    detail: |-
      個人情報（氏名・電話・生年月日・学校・学部等）の閲覧・編集
      SuggestInput（school_master参照）・卒年選択・業界/職種チェックボックス
    role: candidate
    tables: candidates, school_master

  - app: JOBTV
    category: マイページ
    subcategory: エントリー
    name: 応募一覧
    detail: 提出済みエントリー一覧・ステータス表示
    role: candidate
    tables: applications

  - app: JOBTV
    category: マイページ
    subcategory: 説明会予約
    name: 説明会予約一覧
    detail: 予約済み説明会一覧・キャンセルボタン・詳細表示
    role: candidate
    tables: session_reservations

  - app: JOBTV
    category: マイページ
    subcategory: イベント予約
    name: イベント予約一覧
    detail: 予約済みイベント一覧・ステータスバッジ（reserved/cancelled/attended）
    role: candidate
    tables: event_reservations

  - app: JOBTV
    category: マイページ
    subcategory: FAQ
    name: FAQ
    detail: よくある質問ページ
    role: candidate
    tables: "—"

  - app: JOBTV
    category: マイページ
    subcategory: ホーム
    name: マイページホーム
    detail: ユーザー挨拶・LINE連携ステータス+CTAボタン・今後のイベント/説明会サマリ
    role: candidate
    tables: candidates

  # ===========================================================================
  # JOBTV - Studio（企業向け）
  # ===========================================================================

  # --- 企業ページ管理 ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 企業ページ管理
    name: 企業ページ編集（Draft）
    detail: |-
      タグライン・企業説明（Markdown）・カバー画像・ロゴ・SNSリンク・福利厚生JSON
      動画選択・営業時間/アクセス情報の編集
    role: recruiter
    tables: company_pages_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 企業ページ管理
    name: 審査申請
    detail: Draft → submitted に変更して管理者レビューへ提出
    role: recruiter
    tables: company_pages_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 企業ページ管理
    name: 承認状況確認
    detail: 現在のdraft_status（draft/submitted/approved/rejected）の表示
    role: recruiter
    tables: company_pages_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 企業ページ管理
    name: プレビュー
    detail: 承認前のDraftコンテンツプレビュー画面
    role: recruiter
    tables: company_pages_draft

  # --- 動画管理 ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: 動画一覧（カテゴリタブ）
    detail: |-
      main/short/documentary カテゴリ別タブ切り替え
      動画タイトル・サムネイル・ステータスバッジ表示
    role: recruiter
    tables: videos_draft, videos

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: 動画アップロード
    detail: |-
      署名付きURL（Presigned URL）によるS3直接アップロード（500MB上限・15分有効期限）
      アップロード進捗バー（useS3Upload hook）
    role: recruiter
    tables: videos_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: 動画編集
    detail: タイトル・説明・サムネイル画像・動画向き（landscape/portrait）・カテゴリ選択
    role: recruiter
    tables: videos_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: MediaConvert自動変換
    detail: |-
      アップロード確認後にMediaConvertジョブ自動起動
      HLSマスターマニフェスト生成（1080p + 720p）
    role: recruiter
    tables: videos_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: 動画審査申請
    detail: |-
      Draft → submitted に変更、管理者レビューへ提出
      編集時は submitted → draft に戻る
    role: recruiter
    tables: videos_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: 動画プレビュー
    detail: HLSマニフェスト再生（CloudFront or S3）・HLS.jsプレーヤー
    role: recruiter
    tables: videos_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: 動画削除
    detail: 論理削除 + storage_deletion_queue への登録
    role: recruiter
    tables: videos_draft, storage_deletion_queue

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 動画管理
    name: カテゴリ上限管理
    detail: main=1本、shorts/documentary=各10本の上限チェック
    role: recruiter
    tables: videos_draft

  # --- 求人管理 ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 求人管理
    name: 求人一覧
    detail: タイトル・企業名・ステータスバッジ・検索/フィルタ
    role: recruiter
    tables: job_postings_draft, job_postings

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 求人管理
    name: 求人作成/編集
    detail: |-
      タイトル・説明・応募要件・給与・雇用形態・勤務地
      Draft/Production ワークフロー
    role: recruiter
    tables: job_postings_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 求人管理
    name: 応募者一覧
    detail: 求人別の応募者リスト（名前・プロフィール・応募日・ステータス・コメント）
    role: recruiter
    tables: applications

  # --- 説明会管理 ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 説明会管理
    name: 説明会一覧
    detail: タイトル・日時・会場・ステータスの表示
    role: recruiter
    tables: sessions_draft, sessions

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 説明会管理
    name: 説明会作成/編集
    detail: |-
      タイトル・説明・日時・集合時間・会場・Google Maps URL
      複数日程管理（session_dates_draft）
    role: recruiter
    tables: sessions_draft, session_dates_draft

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 説明会管理
    name: 予約者一覧
    detail: |-
      予約者リスト（名前・連絡先・予約日・出席ステータス・リマインダー送信状況）
      CSVエクスポート
    role: recruiter
    tables: session_reservations

  # --- 候補者一覧 ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 候補者一覧
    name: 候補者検索・表示
    detail: |-
      名前・メール・電話・卒年・学校での検索/フィルタ
      候補者プロフィールカード表示（読み取り専用）
    role: recruiter
    tables: candidates

  # --- ダッシュボード ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: ダッシュボード
    name: Studioダッシュボード
    detail: |-
      動画・求人・説明会の総数/承認待ち件数
      最近の応募・予約・承認ステータスアラート
      チームメンバー一覧
    role: recruiter
    tables: "—"

  # --- 通知 ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 通知
    name: アプリ内通知
    detail: 通知一覧（全て/未読/success/warning フィルタ）・既読マーク・削除
    role: recruiter
    tables: notifications, notification_reads

  # --- 設定 ---
  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 設定
    name: プロフィール設定
    detail: recruiterプロフィール（氏名・メール・電話）の更新・アバターアップロード
    role: recruiter
    tables: profiles

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 設定
    name: 企業情報設定
    detail: 企業基本情報（ロゴ・業界・従業員数・設立年等）の閲覧・更新
    role: recruiter
    tables: companies

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 設定
    name: パスワード変更
    detail: 現在のパスワード → 新パスワードへの変更
    role: recruiter
    tables: "—"

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 設定
    name: チームメンバー管理
    detail: チームメンバー一覧・招待・削除
    role: recruiter
    tables: profiles

  - app: JOBTV
    category: Studio（企業向け）
    subcategory: 設定
    name: ヘルプ
    detail: FAQ・ドキュメントリンク・サポート連絡先
    role: recruiter
    tables: "—"

  # ===========================================================================
  # JOBTV - 管理画面
  # ===========================================================================

  # --- コンテンツ審査 ---
  - app: JOBTV
    category: 管理画面
    subcategory: コンテンツ審査
    name: 企業ページ審査
